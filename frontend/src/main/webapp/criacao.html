<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Personagem - RPG</title>
    <link rel="stylesheet" href="style.css">

</head>

<body class="container-criacao">
    <div class="container">
        <h1 class="title-criacao">Criar Personagem</h1>

        <!-- PASSO 1: Escolha da classe -->
        <div id="step-class" class="creation-step active">
            <div class="character-selection">
                <h2 class="subtitle">Escolha sua classe:</h2>
                <div class="classes-grid">
                    <div class="class-card" data-class="cacador">
                        <h3>Caçador</h3>
                        <p>Especialista em ataques à distância e sobrevivência.</p>
                    </div>
                    <div class="class-card" data-class="mago">
                        <h3>Mago</h3>
                        <p>Manipulador de forças arcanas e elementos.</p>
                    </div>
                    <div class="class-card" data-class="barbaro">
                        <h3>Bárbaro</h3>
                        <p>Guerreiro indomável, força bruta e resistência.</p>
                    </div>
                </div>
            </div>
            <a href="home.html" class="back-btn">← Voltar ao Menu</a>
        </div>

        <!-- PASSO 2: Seleção de Subclasse -->
        <div id="step-subclass" class="creation-step">
            <h2 id="subclass-title"></h2>
            <div id="subclass-options" class="subclasses-grid"></div>
            <button id="back-to-class" class="back-btn">← Voltar às classes</button>
        </div>

        <!-- PASSO 3: Nome do Personagem -->
        <div id="step-name" class="creation-step">
            <h2>Qual o nome do seu aventureiro?</h2>
            <input type="text" id="player-name" placeholder="Ex: Kael'thas, o Sombrio" maxlength="30">
            <button id="confirm-name" class="action-btn">Continuar →</button>
            <button id="back-to-subclass" class="back-btn">← Voltar</button>
        </div>

        <!-- PASSO 4: Perguntas (5 perguntas estilo Fear & Hunger) -->
        <div id="step-questions" class="creation-step">
            <div id="question-container">
                <div id="question-text" class="question-text"></div>
                <div class="options-container" id="options-container"></div>
            </div>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <button id="back-to-name" class="back-btn">← Voltar</button>
        </div>

        <!-- PASSO 5: Finalização -->
        <div id="step-finalizing" class="creation-step">
            <div class="loading-animation">
                <p>Forjando seu destino...</p>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
